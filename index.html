<!DOCTYPE html>
<html lang="de">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versicherungen – Lernumgebung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #eaf4fb;
            --bg-card: #ffffff;
            --bg-input: #f0f7fd;
            --accent: #2b7de9;
            --accent-light: #d6eaff;
            --accent-hover: #1a5ec4;
            --text-main: #1a2b3c;
            --text-muted: #5a7084;
            --border: #c4ddf0;
            --border-focus: #2b7de9;
            --shadow: rgba(43, 125, 233, 0.08);
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .view { display: none; animation: fadeIn 0.4s ease-in-out; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; padding: 2.5rem 0 2rem; }
        header h1 { font-size: 2.2rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
        header .subtitle { font-size: 1rem; color: var(--text-muted); font-weight: 500; }

        .card { background: var(--bg-card); border-radius: var(--radius); padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px var(--shadow); border: 1px solid var(--border); }
        
        .login-box { max-width: 400px; margin: 4rem auto; text-align: center; }
        .login-box input { width: 100%; padding: 1rem; margin: 1.5rem 0; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; background: var(--bg-input); }
        
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .dashboard-table th, .dashboard-table td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        .dashboard-table th { background-color: var(--accent-light); color: var(--accent); font-weight: 600; }
        
        .status-badge { display: inline-block; padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background: #e8f5e9; color: #2e7d32; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 10px; overflow: hidden; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        textarea { width: 100%; min-height: 120px; padding: 1rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg-input); font-family: inherit; margin-top: 10px; }
        
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 0.8rem 2rem; background: var(--accent); color: #fff; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; }
        .logout-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); margin-top: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <div id="view-login" class="view active">
            <header><h1>Versicherungen</h1></header>
            <div class="card login-box">
                <h2>Login</h2>
                <input type="email" id="email-input" placeholder="E-Mail eingeben...">
                <button class="btn-primary" onclick="handleLogin()">Einloggen</button>
            </div>
        </div>

        <div id="view-teacher" class="view">
            <header><h1>Lehrer Dashboard</h1></header>
            <div class="card">
                <table class="dashboard-table">
                    <thead><tr><th>Schüler</th><th>Aktuelle Aufgabe</th></tr></thead>
                    <tbody id="student-list"></tbody>
                </table>
            </div>
            <button class="btn-primary logout-btn" onclick="logout()">Ausloggen</button>
        </div>

        <div id="view-student" class="view">
            <header><h1>Arbeitsblatt</h1><div id="student-display"></div></header>
            <div class="card"><div class="video-wrapper"><iframe src="https://tp.srgssr.ch/p/srf/embed?urn=urn:srf:video:484626eb-74b6-48f0-955b-2192276dd48c"></iframe></div></div>
            <div class="card"><h3>Aufgabe 1</h3><textarea data-task="Aufgabe 1"></textarea></div>
            <div class="card"><h3>Aufgabe 2</h3><textarea data-task="Aufgabe 2"></textarea></div>
            <button class="btn-primary logout-btn" onclick="logout()">Ausloggen</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://vshlpndqktpmtnwarxui.supabase.co';
        const supabaseKey = 'sb_publishable_4RadbUY4N2NV5SeaUrvlPg_spcQoznE';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUserEmail = '';

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        async function handleLogin() {
            const email = document.getElementById('email-input').value.trim().toLowerCase();
            if (!email) return;

            currentUserEmail = email;
            localStorage.setItem('savedEmail', email); // Speichert für BEIDE (Lehrer & Schüler)

            if (email.includes('lehrer')) {
                switchView('view-teacher');
                loadDashboardData();
                setupRealtime();
            } else {
                document.getElementById('student-display').innerText = "Eingeloggt als: " + email;
                switchView('view-student');
                updateProgress('Eingeloggt');
            }
        }

        async function updateProgress(taskName) {
            if (!currentUserEmail || currentUserEmail.includes('lehrer')) return;
            // WICHTIG: Erfordert 'Unique' Constraint auf 'email' Spalte in Supabase!
            await supabaseClient.from('student_progress').upsert({ 
                email: currentUserEmail, current_task: taskName, status: 'online' 
            }, { onConflict: 'email' });
        }

        async function loadDashboardData() {
            const { data } = await supabaseClient.from('student_progress').select('*');
            const tbody = document.getElementById('student-list');
            tbody.innerHTML = '';
            if (data) {
                data.forEach(s => {
                    tbody.innerHTML += `<tr><td>${s.email}</td><td><span class="status-badge">${s.current_task}</span></td></tr>`;
                });
            }
        }

        function setupRealtime() {
            supabaseClient
                .channel('any')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'student_progress' }, () => {
                    loadDashboardData();
                })
                .subscribe();
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Textarea-Speicherung für Schüler
            document.querySelectorAll('textarea').forEach((ta, i) => {
                const saved = localStorage.getItem('text_' + i);
                if (saved) ta.value = saved;
                ta.addEventListener('input', () => {
                    localStorage.setItem('text_' + i, ta.value);
                    updateProgress(ta.getAttribute('data-task'));
                });
            });

            // Automatischer Login beim Neuladen
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                document.getElementById('email-input').value = savedEmail;
                handleLogin();
            }
        });
    </script>
</body>
</html>
